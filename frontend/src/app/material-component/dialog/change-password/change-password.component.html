<mat-toolbar color="primary">
  <mat-toolbar-row fxLayout="row">
    <span class="title-center">Change Password</span>
  </mat-toolbar-row>
</mat-toolbar>

<mat-dialog-content>
  <form [formGroup]="changePasswordForm" (ngSubmit)="handleChangePasswordSubmit()" class="form-column">
    <mat-form-field appearance="fill">
      <mat-label>Old Password</mat-label>
      <input matInput formControlName="oldPassword" type="password" required>
      <mat-error *ngIf="changePasswordForm.get('oldPassword')?.errors?.['required']">This field is mandatory</mat-error>
    </mat-form-field>
    
    <mat-form-field appearance="fill">
      <mat-label>New Password</mat-label>
      <input matInput formControlName="newPassword" type="password" required>
      <mat-error *ngIf="changePasswordForm.get('newPassword')?.errors?.['required']">This field is mandatory</mat-error>
    </mat-form-field>
    
    <mat-form-field appearance="fill">
      <mat-label>Confirm Password</mat-label>
      <input matInput formControlName="confirmPassword" type="password" required>
      <mat-error *ngIf="changePasswordForm.get('confirmPassword')?.errors?.['required']">This field is mandatory</mat-error>
      <mat-hint *ngIf="validateSubmit() && !(changePasswordForm.controls.confirmPassword.invalid)" class="error-hint">
        <span>New Password & Confirm Password do not match</span>
      </mat-hint>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button mat-raised-button color="primary" type="submit" 
          [disabled]="validateSubmit() || !(changePasswordForm.valid && changePasswordForm.dirty)"
          (click)="handleChangePasswordSubmit()">
    Update
  </button>
  <button mat-raised-button mat-dialog-close class="close-btn">
    Close
  </button>
</mat-dialog-actions>
