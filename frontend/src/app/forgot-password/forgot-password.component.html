<mat-toolbar>
    <mat-toolbar-row fxLayout="row">
      <span class="title-center">Forgot Password</span>
    </mat-toolbar-row>
  </mat-toolbar>
  
  <mat-dialog-content class="mat-typography">
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="handleSubmit()">
      <div fxLayout="column">
        
        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" required>
          <mat-error *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">This field is mandatory</mat-error>
          <mat-error *ngIf="forgotPasswordForm.get('email')?.errors?.['pattern']">This field is invalid</mat-error>
        </mat-form-field>
      </div>
      <mat-dialog-actions align="center">
        <button mat-raised-button color="primary" type="submit"  [disabled]="forgotPasswordForm.invalid">Send Password</button>
        <button mat-raised-button color="primary" mat-dialog-close>Close</button>
      </mat-dialog-actions>
    </form>
  </mat-dialog-content>
